name: Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: schoollive-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # On tagged release: build release APK and publish
      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          name: SchoolLive Android ${{ github.ref_name }}
          body: |
            ## SchoolLive Android Player ${{ github.ref_name }}

            ### Telepítés
            1. Töltsd le az APK-t
            2. Engedélyezd az "Ismeretlen forrásból való telepítés" opciót
            3. Telepítsd az APK-t
            4. Az első indításkor add meg a szerver URL-jét
            5. Aktiváld az eszközt a webes admin felületen az AL-XXXX azonosítóval

            ### Minimális Android verzió
            Android 5.0 (API 21)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
